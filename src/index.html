<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoRA Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar nav -->
    <nav id="sidebar" class="sidebar hidden">
      <div class="sidebar-brand">
        <div class="brand-icon">◇</div>
        <span class="brand-text">LoRA Trainer</span>
      </div>
      <div class="sidebar-nav">
        <button class="nav-item active" data-page="dashboard">
          <span class="nav-icon">⊞</span> Dashboard
        </button>
        <button class="nav-item" data-page="upload">
          <span class="nav-icon">⊕</span> New Training
        </button>
        <button class="nav-item" data-page="library">
          <span class="nav-icon">◫</span> Model Library
        </button>
        <button class="nav-item" data-page="settings">
          <span class="nav-icon">⊛</span> Settings
        </button>
      </div>
      <div id="update-notification" class="update-card hidden">
        <div class="update-header">
          <span class="update-icon">⚠️</span>
          <span class="update-title" style="font-size: 0.85rem; font-weight: 500;">Update Available</span>
        </div>
        <button id="update-btn" class="update-action-btn">Update App</button>
      </div>
      <div class="sidebar-footer">
        <div class="status-dot online"></div>
        <span class="status-text">Ready</span>
      </div>
    </nav>

    <!-- Main content area -->
    <main id="content" class="content">
      <!-- Pages rendered here by app.js -->
    </main>
  </div>

  <!-- Page scripts -->
  <script src="js/app.js"></script>
  <script src="js/pages/onboarding.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/upload.js"></script>
  <script src="js/pages/train.js"></script>
  <script src="js/pages/library.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/components/chat.js"></script>
  <script src="js/components/gpu-picker.js"></script>
  <script src="js/components/image-grid.js"></script>
  <script src="js/components/progress.js"></script>
</body>
</html>
