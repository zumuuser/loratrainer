# LoRA Trainer — Azure DevOps Compilation Pipeline
trigger:
  - main

stages:
  - stage: Build
    displayName: 'Build and Compile'
    jobs:
      # Linux Compilation (.deb)
      - job: Build_Linux
        displayName: 'Build Linux (.deb)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Install Node.js'

          - script: |
              npm install
            displayName: 'Install dependencies'

          - script: |
              npm run build:linux
            displayName: 'Compile to .deb'

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'dist'
              ArtifactName: 'loratrainer-linux'
              publishLocation: 'Container'
            displayName: 'Publish Linux Artifacts'

      # Docker Image Build & Push
      - job: Build_Docker
        displayName: 'Build and Push Docker Image'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              echo $(GITHUB_TOKEN) | docker login ghcr.io -u zumuuser --password-stdin
              docker build -t ghcr.io/zumuuser/loratrainer/trainer:latest training/docker
              docker push ghcr.io/zumuuser/loratrainer/trainer:latest
            displayName: 'Build and Push Docker to GHCR'
            env:
              GITHUB_TOKEN: $(GITHUB_TOKEN)


