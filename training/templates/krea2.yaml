# KREA 2 RAW — LoRA Training Template
# Auto-generated by LoRA Trainer. Values overridden at runtime.
config:
  name: "${JOB_NAME}"
  process:
    - type: "train"
      training_folder: "${DATASET_PATH}"
      output:
        dtype: float16
        save_dtype: float16
      model:
        name_or_path: "krea-ai/krea-2-raw"
        is_flux: false
      train:
        batch_size: 1
        steps: ${STEPS}
        lr: ${LEARNING_RATE}
        optimizer: "adamw8bit"
        lr_scheduler: "cosine"
        max_denoising_steps: 50
      network:
        type: "lora"
        linear: ${RANK}
        linear_alpha: ${RANK}
      save:
        dtype: float16
        save_every: 500
        max_step_saves_to_keep: 2
      datasets:
        - folder_path: "${DATASET_PATH}"
          caption_ext: ".txt"
          resolution: ${RESOLUTION}
          default_caption: ""
          random_crop: false
          flip_augment: true
